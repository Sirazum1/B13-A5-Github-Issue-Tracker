<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GitHub Issues Tracker</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<div class="app-shell">

<section id="loginPage" class="login-page">

<div class="login-card">

<img src="assets/github-logo.png"
     alt="GitHub Issues Tracker Logo"
     class="login-logo" />

<h1>GitHub Issues Tracker</h1>

<p class="subtitle">
Sign in to explore all open and closed issues.
</p>

<form id="loginForm" class="login-form">

<label>
<span>Username</span>

<input
type="text"
id="username"
placeholder="Enter username"
autocomplete="username"
required
/>
</label>

<label>
<span>Password</span>

<input
type="password"
id="password"
placeholder="Enter password"
autocomplete="current-password"
required
/>
</label>

<button type="submit" class="primary-btn">
Sign In
</button>

<p class="demo-text">
Demo credentials:
<strong>admin</strong> /
<strong>admin123</strong>
</p>

<p id="loginError" class="error-text"></p>

</form>

</div>
</section>
<section id="dashboardPage" class="dashboard-page hidden">

<header class="navbar">

<div class="brand">

<img src="assets/github-logo.png" alt="GitHub Logo" />

<div>
<h2>Issue Tracker</h2>
<p>Track and review repository issues</p>
</div>

</div>

<form id="searchForm" class="search-bar">

<input
type="text"
id="searchInput"
placeholder="Search issues..."
/>

<button
type="submit"
class="primary-btn small-btn">
Search
</button>

</form>

</header>

<main class="content-wrap">

<section class="issues-panel">

<div class="tabs" id="tabButtons">

<button class="tab-btn active" data-filter="all">
All
</button>

<button class="tab-btn" data-filter="open">
Open
</button>

<button class="tab-btn" data-filter="closed">
Closed
</button>

</div>

<div class="panel-header">

<div class="panel-left">

<div class="panel-icon-wrap">
<img src="assets/Aperture.png"
     alt="Issues icon"
     class="panel-icon" />
</div>

<div>
<h3>
<span id="issueCount">0</span>
issues
</h3>

<p id="panelText">
Showing all available issues
</p>
</div>

</div>

<div class="status-markers">

<span class="marker open-marker">
<img src="assets/Open-Status.png"
     alt="Open marker" />
Open
<strong id="openCount">0</strong>
</span>

<span class="marker closed-marker">
<img src="assets/Closed- Status .png"
     alt="Closed marker" />
Closed
<strong id="closedCount">0</strong>
</span>

</div>

</div>

<div id="loader" class="loader-wrap hidden">
<div class="loader"></div>
</div>

<div id="emptyState" class="empty-state hidden">

<h3>No issues found</h3>

<p>
Try another tab or search with a different keyword.
</p>

</div>

<div id="issuesContainer" class="issues-grid"></div>

</section>
</main>
</section>
</div>
